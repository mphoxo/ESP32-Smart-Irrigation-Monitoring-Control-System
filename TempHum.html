<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
  <title>Temperature &amp; Humidity</title>
</head>
<body>
<div class="sensor-page">
  <a href="/admindashboard" class="back-link">← Dashboard</a>

  <h1>Temperature &amp; Humidity</h1>
  <p>Live readings from the DHT22 sensor</p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.25rem;">
    <div class="value-box">
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:.3rem;">TEMPERATURE</p>
      <div class="big-value"><span id="temp">--</span><span class="unit">°C</span></div>
      <div id="temp-badge" class="status-badge badge-blue" style="margin-top:.5rem;">Waiting…</div>
    </div>
    <div class="value-box">
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:.3rem;">HUMIDITY</p>
      <div class="big-value"><span id="hum">--</span><span class="unit">%</span></div>
      <div class="progress-wrap" style="margin-top:.75rem;">
        <div class="progress-fill" id="hum-bar" style="width:0%;background:var(--blue)"></div>
      </div>
    </div>
  </div>
  <div class="last-updated" id="ts"></div>

  <div class="chart-box">
    <h2>Last 20 Temperature Readings over Time</h2>
    <canvas id="chart-temp" height="140"></canvas>
  </div>
  <div class="chart-box">
    <h2>Last 20 Reading of Humidity Percentage over Time</h2>
    <canvas id="chart-hum" height="140"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
function makeChart(id, label, color, yLabel) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [{ label, data: [],
      borderColor: color, backgroundColor: color+'22',
      tension: .35, fill: true, pointRadius: 3 }] },
    options: {
      animation: false,
      scales: {
        x: {
          title: { display: true, text: 'Time', color: '#757575', font: { size: 12 } },
          ticks: { maxTicksLimit: 6 }
        },
        y: {
          title: { display: true, text: yLabel, color: '#757575', font: { size: 12 } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}
const cTemp = makeChart('chart-temp', 'Temp °C',    '#e53935', 'Temperature (°C)');
const cHum  = makeChart('chart-hum',  'Humidity %', '#1e88e5', 'Humidity (%)');

function loadTH() {
  fetch('/get_sensor/temp').then(r => r.json()).then(d => {
    const v = d.distance;
    if (v === null || v === undefined) return;
    const val = parseFloat(v);
    document.getElementById('temp').textContent = val.toFixed(1);
    document.getElementById('ts').textContent   = 'Updated: ' + new Date().toLocaleTimeString();

    const badge = document.getElementById('temp-badge');
    if (val > 35)      { badge.textContent='High';   badge.className='status-badge badge-red'; }
    else if (val < 10) { badge.textContent='Cold';    badge.className='status-badge badge-blue'; }
    else               { badge.textContent='Normal';  badge.className='status-badge badge-green'; }
  });

  fetch('/get_sensor/humidity').then(r => r.json()).then(d => {
    const v = d.distance;
    if (v === null || v === undefined) return;
    const val = parseFloat(v);
    document.getElementById('hum').textContent        = val.toFixed(1);
    document.getElementById('hum-bar').style.width    = val + '%';
  });
}

function loadHistory() {
  fetch('/history/temp').then(r => r.json()).then(rows => {
    cTemp.data.labels = rows.map(r => r.ts);
    cTemp.data.datasets[0].data = rows.map(r => parseFloat(r.val));
    cTemp.update();
  });
  fetch('/history/humidity').then(r => r.json()).then(rows => {
    cHum.data.labels = rows.map(r => r.ts);
    cHum.data.datasets[0].data = rows.map(r => parseFloat(r.val));
    cHum.update();
  });
}

loadTH();      setInterval(loadTH,      2000);
loadHistory(); setInterval(loadHistory, 10000);
</script>
</body>
</html>
