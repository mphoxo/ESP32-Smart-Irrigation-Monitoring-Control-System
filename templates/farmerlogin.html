<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Farmer Login</title>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm p-4" style="width:100%;max-width:400px;">
    <div class="text-center mb-3" style="font-size:2.5rem;">🌾</div>
    <h4 class="card-title mb-4 text-center">Farmer Login</h4>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form action="/farmerlogin" method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Sensor Role</label>
        <select class="form-select" name="role" required>
          <option value="" disabled selected>Select your role</option>
          <option value="2">Soil Moisture Farmer</option>
          <option value="3">Temp &amp; Humidity Farmer</option>
          <option value="4">Water Level Farmer</option>
          <option value="5">Motion Detector Farmer</option>
          <option value="6">Rainfall Detector Farmer</option>
        </select>
      </div>
      <button type="submit" class="btn w-100">Login</button>
    </form>
    <div class="text-center mt-3">
      <a href="/" style="color:var(--green);font-size:.9rem;">← Back to Home</a>
    </div>
  </div>
</body>
</html>
