<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Smart Irrigation – Home</title>
  <style>
    body { background: var(--body-bg); }
    .hero {
      max-width: 460px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    .hero-icon { font-size: 4rem; margin-bottom: 1rem; }
    .hero h1   { font-size: 1.9rem; margin-bottom: .4rem; }
    .hero p    { margin-bottom: 2rem; }
    .login-grid { display: grid; gap: .85rem; }
  </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="hero">
    <h1>Smart Irrigation System</h1>
    <p>Real-time sensor monitoring for smarter farming</p>
    <div class="login-grid">
      <a href="/adminlogin"  class="btn">Login as Administrator</a>
      <a href="/farmerlogin" class="btn" style="background:var(--blue)">Login as Farmer</a>
    </div>
  </div>
</body>
</html>
